<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14; /* deep graphite black */
    color: #e5e7eb;
    line-height: 1.6;
  }

  /* HERO */
  .hero {
    padding: 110px 20px;
    text-align: center;
    background: radial-gradient(circle at top, #1a1f2a, #0b0f14);
    border-bottom: 1px solid #1f2937;
  }

  .hero h1 {
    font-size: 52px;
    margin-bottom: 10px;
    color: #f5f5f5;
    letter-spacing: 1px;
  }

  .hero p {
    font-size: 18px;
    color: #c0c0c0;
    max-width: 850px;
    margin: auto;
  }

  .btn {
    display: inline-block;
    margin-top: 25px;
    padding: 14px 24px;
    background: linear-gradient(135deg, #d4af37, #b08d2f);
    color: #0b0f14;
    text-decoration: none;
    border-radius: 10px;
    font-weight: bold;
    box-shadow: 0 0 20px rgba(212,175,55,0.25);
    transition: 0.3s;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(212,175,55,0.4);
  }

  /* SECTIONS */
  .container {
    max-width: 1000px;
    margin: auto;
    padding: 60px 20px;
  }

  h2 {
    color: #d4af37; /* gold headings */
    margin-bottom: 18px;
    letter-spacing: 0.5px;
  }

  .card {
    background: linear-gradient(145deg, #141a23, #0e131a);
    padding: 22px;
    border-radius: 14px;
    margin-bottom: 20px;
    border: 1px solid #1f2937;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .tag {
    display: inline-block;
    background: rgba(212,175,55,0.1);
    color: #d4af37;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    margin: 5px 5px 0 0;
    border: 1px solid rgba(212,175,55,0.3);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
  }

  footer {
    text-align: center;
    padding: 40px;
    font-size: 13px;
    color: #6b7280;
    border-top: 1px solid #1f2937;
  }
</style>
